pre-commit:
  piped: true
  commands:
    format-fix:
      run: just format-fix
    lint-fix:
      run: just lint-fix
    check-clean:
      run: git diff --exit-code

pre-push:
  commands:
    format-check:
      run: just format-check
    lint-check:
      run: just lint
    test:
      run: just test
