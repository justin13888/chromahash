name: CI (Kotlin)

on:
  push:
    branches: [main]
    paths: ["kotlin/**", ".github/workflows/ci-kotlin.yml"]
  pull_request:
    paths: ["kotlin/**", ".github/workflows/ci-kotlin.yml"]

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kotlin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('kotlin/**/*.gradle*', 'kotlin/**/gradle-wrapper.properties') }}

      - name: Format check (ktlint)
        run: ./gradlew ktlintCheck

      - name: Test
        run: ./gradlew test

      - name: Build
        run: ./gradlew build
