name: CI (Go)

on:
  push:
    branches: [master]
    paths: ["go/**", ".github/workflows/ci-go.yml"]
  pull_request:
    paths: ["go/**", ".github/workflows/ci-go.yml"]

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Format check
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
