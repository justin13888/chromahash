name: CI (Swift)

on:
  push:
    branches: [master]
    paths: ["swift/**", ".github/workflows/ci-swift.yml"]
  pull_request:
    paths: ["swift/**", ".github/workflows/ci-swift.yml"]

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: swift
    steps:
      - uses: actions/checkout@v4

      - name: Install Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.2.4"

      - name: Build
        run: swift build

      - name: Test
        run: swift test
